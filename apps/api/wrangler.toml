name = "md-api"
main = "./src/index.ts"
compatibility_date = "2024-11-01"
compatibility_flags = [ "nodejs_compat" ]

# 自定义域名（zone doocs.org 需在同一 Cloudflare 账号下，部署时自动创建 DNS）
[[routes]]
pattern = "md-api.doocs.org"
custom_domain = true

# D1 数据库绑定。
# database_id 为 doocs/md 官方部署所用实例（资源标识符，非密钥）。
# 自行部署（fork）时请执行 `wrangler d1 create md-sync`，
# 并把返回的 database_id 替换为你自己的实例 ID。
[[d1_databases]]
binding = "DB"
database_name = "md-sync"
database_id = "d7659e81-8fda-4abc-b128-f7a5975f7a7d"
migrations_dir = "migrations"

# 分享页静态资源（favicon 等）
[assets]
directory = "./public"
binding = "ASSETS"

# 非敏感变量（可直接提交）。生产部署时按需覆盖。
[vars]
# 前端来源白名单，用于 CORS 与「登录后回跳到发起方」。
# 支持通配符 `*`（匹配单个主机标签）。第一个非通配项作为默认回跳地址。
# - 生产站、Gitee Pages、Cloudflare Workers、本地开发、PR 预览
APP_URL = "https://md.doocs.org,https://doocs.gitee.io,https://md.doocs.workers.dev,http://localhost:5173,https://md-pr-*.doocs.workers.dev,https://doocs-md-preview-pr-*.surge.sh"

# 爱发电创作者 user_id（开发者后台可见，非密钥）
AFDIAN_USER_ID = "f001c5a8655111f18f5e52540025c377"
# 可开通 Pro 的爱发电方案 plan_id（月 / 季 / 年）
AFDIAN_PRO_PLAN_IDS = "81efdc48655711f18b6d52540025c377,ced9acca655a11f1a7cc52540025c377,df5084a2655a11f1bea45254001e7c00"

# 默认图床上传 API（UPLOAD_ENABLED + 前端 VITE_UPLOAD_VIA_API 共同控制）
UPLOAD_ENABLED = "true"
UPLOAD_BACKEND = "github"
UPLOAD_GITHUB_USERNAME = "bucketio"
# 留空则默认 img0–img19
UPLOAD_GITHUB_REPO_LIST = ""
UPLOAD_GITHUB_BRANCH = "main"
UPLOAD_GITHUB_USE_CDN = "true"

# 以下为敏感变量，请勿写入此文件，使用 `wrangler secret put` 设置：
#   wrangler secret put GITHUB_CLIENT_ID
#   wrangler secret put GITHUB_CLIENT_SECRET
#   wrangler secret put JWT_SECRET
#   wrangler secret put AFDIAN_API_TOKEN
#   wrangler secret put AFDIAN_WEBHOOK_TOKEN   # 可选：爱发电 Webhook 路径密钥
#   wrangler secret put UPLOAD_GITHUB_TOKENS_BUCKETIO   # 图床 GitHub PAT，逗号分隔（UPLOAD_ENABLED 时必填）
