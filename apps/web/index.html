<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <meta name="keywords" content="md,markdown,markdown-editor,wechat,official-account,yanglbme,doocs" />
    <meta name="description" content="Wechat Markdown Editor | 一款高度简洁的微信 Markdown 编辑器" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>微信 Markdown 编辑器 | Doocs</title>
    <link rel="shortcut icon" href="/favicon.png" />
    <link rel="apple-touch-icon-precomposed" href="/favicon.png" />
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
      }

      .loading {
        position: fixed;
        inset: 0;
        z-index: 99999;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        font-size: 18px;
        background-color: #ffffff;
      }

      .loading::before {
        content: url('/src/assets/images/favicon.png');
        width: 100px;
        height: 100px;
        margin-bottom: 26px;
      }

      .loading.dark {
        color: #ffffff;
        background-color: #141414;
      }

      .loading .txt {
        position: absolute;
        bottom: 10%;
      }

      .loading .txt::after {
        content: '...';
        animation: dots 1.5s steps(4, end) infinite;
      }

      @keyframes dots {
        0% {
          content: ' ';
        }
        25% {
          content: '.';
        }
        50% {
          content: '..';
        }
        75% {
          content: '...';
        }
      }
    </style>
  </head>

  <body>
    <noscript>
      <strong>Please enable JavaScript to continue.</strong>
    </noscript>
    <div id="app-initial-loader" class="loading">
      <strong>致力于让 Markdown 编辑更简单</strong>
      <p class="txt">正在加载编辑器</p>
      <p class="timeout-tip" style="display: none; color: #e53935; font-size: 16px; margin-top: 2em">
        加载时间过长，请尝试刷新页面或按 F12 查看控制台是否有异常信息
      </p>
    </div>
    <div id="app"></div>
    <script>
      const theme = localStorage.getItem('vueuse-color-scheme')
      const loader = document.getElementById('app-initial-loader')
      if (
        loader &&
        (theme === 'dark' || (theme === 'auto' && window.matchMedia('(prefers-color-scheme: dark)').matches))
      ) {
        loader.classList.add('dark')
      }

      setTimeout(() => {
        const tip = loader?.querySelector('.timeout-tip')
        if (tip) {
          tip.style.display = 'block'
        }
      }, 30000)
    </script>
    <script type="module" src="/src/main.ts"></script>
    <script type="module" src="/src/sidepanel.ts"></script>
  </body>
</html>
