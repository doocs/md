minimumReleaseAge: 0

shellEmulator: true

trustPolicy: no-downgrade

packages:
  - apps/*
  - packages/*

overrides:
  '@codemirror/state': 'catalog:'
  '@codemirror/view': 'catalog:'
  # GHSA-frvp-7c67-39w9 (dependabot/312): @modelcontextprotocol/sdk pins ^1.19.9; fix only in 2.0.5+
  '@hono/node-server': ^2.0.5
  # Pin typescript-eslint to one exact patch (eslint-plugin-command otherwise pulls 8.60.x).
  '@typescript-eslint/eslint-plugin': 8.65.0
  '@typescript-eslint/parser': 8.65.0
  '@typescript-eslint/project-service': 8.65.0
  '@typescript-eslint/rule-tester': 8.65.0
  '@typescript-eslint/scope-manager': 8.65.0
  '@typescript-eslint/tsconfig-utils': 8.65.0
  '@typescript-eslint/type-utils': 8.65.0
  '@typescript-eslint/types': 8.65.0
  '@typescript-eslint/typescript-estree': 8.65.0
  '@typescript-eslint/utils': 8.65.0
  '@typescript-eslint/visitor-keys': 8.65.0
  '@webext-core/isolated-element': 1.1.4
  # CVE-2026-39244 / GHSA-xcpc-8h2w-3j85 (dependabot/311): firefox-profile pins ~0.5.x
  adm-zip: ^0.6.0
  ajv@^8: ^8.20.0
  bn.js: '>=5.2.5'
  bn.js@^5: ^5.2.5
  confbox: 0.2.4
  core-js: ^3.49.0
  cross-spawn@<7: ^7.0.6
  crypto-browserify: npm:empty-module@0.0.2
  dompurify: ^3.4.12
  esbuild: '>=0.28.1'
  # CVE-2026-16221 / GHSA-v2hh-gcrm-f6hx (dependabot/314): ajv pins fast-uri ^3.0.1
  fast-uri: ^3.1.4
  flatted@<3.4.0: ^3.4.2
  glob@<8: ^13.0.6
  glob@^10: ^13.0.6
  glob@^11: ^11.1.0
  inflight: npm:@hishprorg/voluptates-laborum@^2.0.0
  ini: '>=7.0.0'
  js-yaml: ^4.3.0
  jsdom>undici: ^7.25.0
  lodash-es: ^4.18.1
  markdown-it: ^14.3.0
  minimatch: ^10.2.5
  minimatch@^10: ^10.2.5
  minimatch@^5: ^10.2.5
  minimatch@^9: ^10.2.5
  prettier: 'catalog:'
  qs: ^6.15.3
  querystring: npm:qs@^6.15.3
  semver: ^7.8.5
  serialize-javascript@<7.0.3: ^7.0.7
  # GHSA sharp/libvips (dependabot/313): miniflare/wrangler pin sharp 0.34.5
  sharp: ^0.35.0
  shell-quote: ^1.10.0
  source-map@0.8.0-beta.0: 0.7.4
  tinyexec: 1.2.4
  tmp: '>=0.2.7'
  underscore@<1.13.8: 1.13.8
  undici@^6: ^8.8.0
  undici@^7: ^8.8.0
  uuid: 'catalog:'
  workbox-build>source-map: 0.7.4
  ws@<8.21.0: ^8.21.1
  yauzl: ^3.4.0

allowBuilds:
  '@vscode/vsce-sign': true
  core-js: true
  esbuild: true
  keytar: true
  sharp: true
  simple-git-hooks: true
  spawn-sync: true
  vue-demi: true
  workerd: true

patchedDependencies:
  '@codemirror/view@6.43.6': patches/@codemirror__view@6.43.6.patch
  front-matter@4.0.2: patches/front-matter@4.0.2.patch
  juice@12.1.1: patches/juice@12.1.1.patch

# Shared direct-dep versions across the monorepo (reference with `catalog:`).
catalog:
  '@cloudflare/workers-types': ^5.20260724.1
  '@codemirror/state': 6.7.1
  '@codemirror/view': 6.43.6
  '@types/node': ^26.1.1
  isomorphic-dompurify: ^3.19.0
  marked: ^18.0.7
  prettier: 2.8.8
  tsx: ^4.23.1
  typescript: ~6.0.3
  uuid: ^14.0.1
  vitest: ^4.1.10
  wrangler: ^4.114.0

peerDependencyRules:
  allowedVersions:
    vite: '8'
