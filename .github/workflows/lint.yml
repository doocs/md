name: Lint

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          # Pin exact version: pnpm 11.12.0 self-update crashes in action-setup
          # https://github.com/pnpm/action-setup/issues/276
          version: 11.11.0

      - name: Install dependencies
        run: pnpm install

      - name: Run lint
        run: pnpm run lint

  type-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          # Pin exact version: pnpm 11.12.0 self-update crashes in action-setup
          # https://github.com/pnpm/action-setup/issues/276
          version: 11.11.0

      - name: Install dependencies
        run: pnpm install

      - name: Run type-check
        run: pnpm run type-check

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          # Pin exact version: pnpm 11.12.0 self-update crashes in action-setup
          # https://github.com/pnpm/action-setup/issues/276
          version: 11.11.0

      - name: Install dependencies
        run: pnpm install

      - name: Run tests
        run: pnpm run test
